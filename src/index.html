<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight Game</title>
    <style>
        html, body { margin: 0; height: 100%; background: #0e1116; overflow: hidden; }
        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        #game {
            flex: 1;
            min-width: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0e1116;
        }
        #game canvas { display: block; }
        #log-panel {
            width: 280px;
            flex-shrink: 0;
            background: #141a22;
            color: #c8d0dc;
            font: 13px/1.4 system-ui, sans-serif;
            overflow-y: auto;
            border-left: 1px solid #2a3340;
            padding: 8px 10px;
            box-sizing: border-box;
        }
        #log-lines .entry { margin-bottom: 4px; }
        #log-lines .entry.round {
            margin-top: 10px;
            font-weight: 600;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="game"></div>
        <div id="log-panel">
            <div id="log-lines"></div>
        </div>
    </div>
    <script src="bundle.js"></script>
</body>
</html>
